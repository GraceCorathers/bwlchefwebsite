<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>{% block title %}{% endblock %}</title>
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍳</text></svg>">
</head>

<body class="bod">
  <nav class="navbar navbar-expand-lg bg-body-tertiary navbar-right">
    <div class="container-fluid navbar-right">
      <a class="navbar-brand"><strong></strong></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
        aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse navbar-right" id="navbarNavAltMarkup">
        <div class="navbar-nav navbar-right">
          <a class="nav-link navbar-right" href="{{ url_for('index') }}">Home</a>
          <a class="nav-link navbar-right" href="{{ url_for('about') }}">About</a>
          <a class="nav-link navbar-right" href="{{ url_for('recipes') }}">Recipes</a>
          <a class="nav-link navbar-right" href="{{ url_for('blog') }}">Blog</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="body-content">
    {% block content %}
    {% endblock %}
    <hr />
    <footer>
      <p>&copy; 2025 Grace Corathers</p>
    </footer>
  </div>
</body>

</html>
